name: weather-edge
region: blr

workers:
  - name: scheduler
    github:
      repo: VyachAp/WeatherEdge
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: python -m src.cli run
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_CHAT_ID
        scope: RUN_TIME
        type: SECRET
      - key: MIN_EDGE
        scope: RUN_TIME
        value: "0.10"
      - key: KELLY_FRACTION
        scope: RUN_TIME
        value: "0.25"
      - key: MAX_POSITION_PCT
        scope: RUN_TIME
        value: "0.05"
      - key: INITIAL_BANKROLL
        scope: RUN_TIME
        value: "139"

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
